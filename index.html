<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#e5e5e5;min-height:100vh;}

<body>
<div class="app" id="app">

  <!-- LOGIN -->
  <div id="login-screen" class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-mark">N</div>
        <div><div class="login-title">NLS Training Tracker</div><div class="login-sub">Sign in with your NLS email</div></div>
      </div>
      <div id="login-form">
        <div class="lf"><label class="lbl">Email address</label><input type="email" id="login-email" placeholder="you@nls.solutions" onkeydown="if(event.key==='Enter')sendMagicLink()"/></div>
        <button class="login-btn" onclick="sendMagicLink()" id="magic-btn">Send magic link</button>
        <div class="login-msg" id="login-msg"></div>
        <div class="hint">Enter your @nls.solutions email. We'll send you a sign-in link — no password needed.</div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-screen" style="display:none">
    <div class="topbar">
      <div><div class="t1">NLS Training Tracker</div><div class="t2">Employee training management &amp; audit</div></div>
      <div class="user-pill">
        <div class="u-av" id="top-av"></div>
        <div><div class="u-name" id="top-name"></div><div class="u-role" id="top-role"></div></div>
        <button class="logout-btn" onclick="doLogout()">Sign out</button>
      </div>
    </div>
    <div class="tabs" id="tabs-bar"></div>
    <div id="tab-content"></div>
  </div>

</div>

<script>
// ── SUPABASE INIT ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://qtwmkzratgvbljanqxct.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZiNe0sqNK2ibyFBTE2HTAQ_lRrS0tuo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    detectSessionInUrl: true,
    persistSession: true,
    autoRefreshToken: true,
    storage: window.localStorage
  }
});

// ── STATE ────────────────────────────────────────────────────────────────────
let cu = null;        // current user profile (from users table)
let cuSession = null; // supabase session
let allUsers = [];
let allMods = [];
let allRecords = [];
let allAudit = [];
let selEmpId = null;
let activeTab = 'tracker';

// ── AUTH ─────────────────────────────────────────────────────────────────────
async function sendMagicLink() {
  const email = document.getElementById('login-email').value.trim();
  const msg = document.getElementById('login-msg');
  const btn = document.getElementById('magic-btn');
  if (!email) { msg.textContent = 'Please enter your email.'; msg.className = 'login-msg error'; return; }
  if (!email.endsWith('@nls.solutions')) { msg.textContent = 'Only @nls.solutions addresses are allowed.'; msg.className = 'login-msg error'; return; }
  btn.disabled = true; btn.textContent = 'Sending...';
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: 'https://aaronhendrix-nls.github.io/nls-training-tracker' } });
  btn.disabled = false; btn.textContent = 'Send magic link';
  if (error) { msg.textContent = 'Error: ' + error.message; msg.className = 'login-msg error'; }
  else { msg.textContent = '✓ Check your inbox — link sent to ' + email; msg.className = 'login-msg success'; }
}

async function doLogout() {
  await sb.auth.signOut();
  cu = null; cuSession = null; allUsers = []; allMods = []; allRecords = []; allAudit = [];
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
async function bootApp(email) {
  // Load or create user profile
  let { data: profile } = await sb.from('users').select('*').eq('email', email).single();
  if (!profile) {
    // Auto-create profile on first login
    const name = email.split('@')[0].replace('.', ' ').replace(/\b\w/g, c => c.toUpperCase());
    const { data: newProfile } = await sb.from('users').insert({ email, name, permission: 'user' }).select().single();
    profile = newProfile;
  }
  cu = profile;
  // Load all data
  await loadAllData();
  // Show main app
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  const av = document.getElementById('top-av');
  av.textContent = initials(cu.name);
  av.className = 'u-av ' + (cu.avatar || 'g');
  document.getElementById('top-name').textContent = cu.name;
  document.getElementById('top-role').textContent = cu.title + ' · ' + pLabel(cu.permission);
  selEmpId = null;
  activeTab = cu.permission === 'user' ? 'my-training' : cu.permission === 'instructor' ? 'sessions' : 'tracker';
  renderTabs();
}

async function loadAllData() {
  const [u, m, r, a] = await Promise.all([
    sb.from('users').select('*').order('name'),
    sb.from('modules').select('*').order('name'),
    sb.from('training_records').select('*'),
    sb.from('audit_log').select('*').order('created_at', { ascending: false }).limit(100)
  ]);
  allUsers = u.data || [];

  allRecords = r.data || [];

}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function initials(name) { return (name||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2); }
function pLabel(p) { return p==='admin'?'Admin':p==='supervisor'?'Supervisor':p==='instructor'?'Instructor':'User'; }
function rbCls(p) { return p==='admin'?'rb-admin':p==='supervisor'?'rb-sup':p==='instructor'?'rb-inst':'rb-user'; }
function avc(a) { return a||'g'; }
function emailLink(email) { if(!email)return''; return '<a class="email-link" href="mailto:'+email+'">✉ '+email+'</a>'; }

function getRecords(userId) { return allRecords.filter(r=>r.user_id===userId); }
function pct(userId) {
  const recs = getRecords(userId);
  if (!recs.length) return 0;
  const done = recs.filter(r=>r.status==='done'||r.status==='waived'||r.status==='cert-submitted').length;
  return Math.round(done/recs.length*100);
}
function isFullyComplete(userId) {
  const recs = getRecords(userId);
  if (!recs.length) return false;
  return recs.every(r=>r.status==='done'||r.status==='waived');
}
function getAssigned(supId) { return allUsers.filter(u=>u.sup_id===supId&&u.id!==supId); }
function certsPendingFor(supId) {
  let c=0;
  getAssigned(supId).forEach(u=>{ getRecords(u.id).forEach(r=>{ if(r.status==='cert-submitted')c++; }); });
  return c;
}
function canSignOff(targetId) {
  if(cu.permission==='admin') return true;
  if(cu.id===targetId) return false;
  if(cu.permission==='supervisor') { const t=allUsers.find(u=>u.id===targetId); return t&&t.sup_id===cu.id; }
  return false;
}
function canAssign(targetId) {
  if(cu.permission==='admin') return true;
  if(cu.permission==='supervisor') { const t=allUsers.find(u=>u.id===targetId); return t&&t.sup_id===cu.id; }
  return false;
}
function getBadge(type) {
  if(type==='safety')return'<span class="badge bcs">safety</span>';
  if(type==='nls')return'<span class="badge bcn">NLS</span>';
  if(type==='core')return'<span class="badge bcc">core</span>';
  if(type==='udemy')return'<span class="badge bcu">Udemy</span>';
  return'<span class="badge bco">optional</span>';
}
function getDlvBadge(d) {
  if(d==='instructor')return'<span class="delivery-badge">instructor-led</span>';
  if(d==='udemy')return'<span class="badge bcu">Udemy</span>';
  return'<span class="badge bco">self-paced</span>';
}
function fmtTime(ts) {
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

async function addAudit(type, description) {
  const entry = { action_type: type, description, actor_id: cu.id, actor_name: cu.name };
  const { data } = await sb.from('audit_log').insert(entry).select().single();
  if (data) allAudit.unshift(data);
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  const p = cu.permission;
  const tabs = p==='admin'?['tracker','library','admin','audit']:p==='supervisor'?['tracker','library']:p==='instructor'?['sessions']:['my-training'];
  if(!tabs.includes(activeTab)) activeTab = tabs[0];
  const labels = {tracker:'Tracker','my-training':'My Training',library:'Module Library',admin:'Admin',audit:'Audit Log',sessions:'My Sessions'};
  const cc = p==='supervisor' ? certsPendingFor(cu.id) : 0;
  document.getElementById('tabs-bar').innerHTML = tabs.map(t => {
    const badge = (t==='tracker'&&cc>0) ? '<span style="background:#EF9F27;color:#412402;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:500;margin-left:4px">'+cc+'</span>' : '';
    return '<button class="tab'+(activeTab===t?' on':'')+'" onclick="switchTab(\''+t+'\')">'+labels[t]+badge+'</button>';
  }).join('');
  renderTabContent();
}
function switchTab(t) { activeTab=t; renderTabs(); }
function renderTabContent() {
  const c = document.getElementById('tab-content');
  if(activeTab==='tracker') c.innerHTML = buildTracker();
  else if(activeTab==='my-training') c.innerHTML = buildUserView();
  else if(activeTab==='library') c.innerHTML = buildLibrary();
  else if(activeTab==='admin') c.innerHTML = buildAdmin();

}

      +'<input id="em-name-'+m.id+'" value="'+m.name+'" style="flex:1;min-width:140px;font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid #3a3a52;background:#1a1a2e;color:#e5e5e5;font-family:inherit"/>'
      +'<select id="em-type-'+m.id+'" style="font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid #3a3a52;background:#1a1a2e;color:#e5e5e5;font-family:inherit"><option value="safety"'+(m.type==="safety"?" selected":"")+'>Safety</option><option value="nls"'+(m.type==="nls"?" selected":"")+'>NLS</option><option value="core"'+(m.type==="core"?" selected":"")+'>Core</option><option value="udemy"'+(m.type==="udemy"?" selected":"")+'>Udemy</option><option value="opt"'+(m.type==="opt"?" selected":"")+'>Optional</option></select>'
      +'<select id="em-del-'+m.id+'" style="font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid #3a3a52;background:#1a1a2e;color:#e5e5e5;font-family:inherit"><option value="instructor"'+(m.delivery==="instructor"?" selected":"")+'>Instructor-led</option><option value="udemy"'+(m.delivery==="udemy"?" selected":"")+'>Udemy</option><option value="self"'+(m.delivery==="self"?" selected":"")+'>Self-paced</option></select>'
      +'<input id="em-dur-'+m.id+'" value="'+(m.duration||'')+'" placeholder="Duration" style="width:80px;font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid #3a3a52;background:#1a1a2e;color:#e5e5e5;font-family:inherit"/>'
      +'<input id="em-udemy-'+m.id+'" value="'+(m.udemy_url||'')+'" placeholder="Udemy URL" style="flex:1;min-width:160px;font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid #3a3a52;background:#1a1a2e;color:#e5e5e5;font-family:inherit"/>'
      +'<button class="btn-add" onclick="saveModEdit(\''+ m.id +'\')" >Save</button></div>':'';    return '<div>'
      +'<div class="lib-row"><div class="lib-info"><div class="lib-name">'+m.name+badge+dlv+ulink+'</div><div class="lib-meta">'+(m.duration||'')+( m.udemy_url?' · Udemy attached':'')+'</div></div>'
      +'<div style="display:flex;gap:5px;align-items:center">'
      +'<button class="edit-user-btn" data-viewmod="'+m.id+'">' +(isSelMod?'▲ hide':'▼ view')+'</button>'
      +(isAdmin?'<button class="edit-user-btn" onclick="toggleEditMod(\''+ m.id +'\')" >edit</button><button class="del-btn" onclick="deleteMod(\''+ m.id +'\',\''+ m.name +'\')" >remove</button>':'')      +'</div></div>'
      +(isSelMod?buildModuleDetail(m.id):'')      +editForm+'</div>';
  }).join('') : '<div class="empty-state" style="padding:24px"><div class="es-icon">📚</div><div class="es-title">No modules yet</div><div class="es-sub">Use the form above to add your first training module</div></div>';

  const addForm = isAdmin?'<div class="form-card"><div class="form-title">Add training module</div>'
    +'<div class="form-grid"><input id="nm-name" placeholder="Module name *"/><select id="nm-type"><option value="safety">Safety</option><option value="nls">NLS Proprietary</option><option value="core" selected>Core Skill</option><option value="udemy">Udemy</option><option value="opt">Optional</option></select></div>'
    +'<div class="form-grid"><select id="nm-del"><option value="instructor">Instructor-led</option><option value="udemy">Udemy</option><option value="self" selected>Self-paced</option></select><input id="nm-dur" placeholder="Duration (e.g. 2.5 hours)"/></div>'
    +'<div class="form-full"><input id="nm-udemy" placeholder="Udemy URL (if applicable)"/></div>'
    +'<div id="mod-err" class="error-msg">Please enter a module name.</div>'
    +'<div class="form-actions"><button class="btn-cancel" onclick="clearModForm()">Clear</button><button class="btn-add" onclick="addMod()">Add to library</button></div></div>':'';  return '<div class="form-section">'+addForm+'<div class="section-label">Current modules</div><div class="table-panel">'+rows+'</div></div>';
}

function toggleEditMod(id){const el=document.getElementById('edit-'+id);if(el)el.style.display=el.style.display==='flex'?'none':'flex';}
async function saveModEdit(id){
  const name=document.getElementById('em-name-'+id).value.trim();if(!name)return;
  const updates={name,type:document.getElementById('em-type-'+id).value,delivery:document.getElementById('em-del-'+id).value,duration:document.getElementById('em-dur-'+id).value.trim()||null,udemy_url:document.getElementById('em-udemy-'+id).value.trim()||null};
  await sb.from('modules').update(updates).eq('id',id);
  await addAudit('assign',"Module '"+name+"' updated");
  await loadAllData(); renderTabContent();
}
async function deleteMod(id,name){
  await sb.from('modules').delete().eq('id',id);
  await addAudit('assign',"Module '"+name+"' removed from library");
  await loadAllData(); renderTabContent();
}
async function addMod(){
  const name=document.getElementById('nm-name').value.trim();const err=document.getElementById('mod-err');
  if(!name){err.style.display='block';return;}err.style.display='none';
  const mod={name,type:document.getElementById('nm-type').value,delivery:document.getElementById('nm-del').value,duration:document.getElementById('nm-dur').value.trim()||null,udemy_url:document.getElementById('nm-udemy').value.trim()||null};
  await sb.from('modules').insert(mod);
  await addAudit('assign',"Module '"+name+"' added to library");
  clearModForm(); await loadAllData(); renderTabContent();
}
function clearModForm(){['nm-name','nm-dur','nm-udemy'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});}

// ── ADMIN ────────────────────────────────────────────────────────────────────
function buildAdmin() {
  const allSupOpts = allUsers.filter(u=>u.permission==='supervisor'||u.permission==='admin').map(s=>'<option value="'+s.id+'">'+s.name+'</option>').join('');
  const rows = allUsers.map(u=>{
    const sup=allUsers.find(s=>s.id===u.sup_id);
    const elink=u.email?'<a class="email-link" style="font-size:10px" href="mailto:'+u.email+'">✉ '+u.email+'</a>':"<span style='font-size:10px;color:#9ca3af'>no email set</span>";
    const supEditOpts='<option value="">No supervisor</option>'+allUsers.filter(s=>s.permission==='supervisor'||s.permission==='admin').map(s=>'<option value="'+s.id+'"'+(u.sup_id===s.id?' selected':'')+'>'+s.name+'</option>').join('');
    return '<div class="urow" id="urow-'+u.id+'">'
      +'<div class="urow-main"><div class="av '+avc(u.avatar)+'">'+initials(u.name)+'</div>'
      +'<div class="ui"><div class="un">'+u.name+'</div><div class="um">'+u.title+(sup?' · '+sup.name:'')+'</div><div>'+elink+'</div></div>'
      +'<span class="role-badge '+rbCls(u.permission)+'">'+pLabel(u.permission)+'</span>'
      +'<div class="row-actions"><button class="edit-user-btn" onclick="toggleUserEdit(\''+u.id+'\')">edit</button>'
      +(u.id!==cu.id?'<button class="del-btn" onclick="deleteUser(\''+u.id+'\',\''+u.name+'\')">remove</button>':'')
      +'</div></div>'
      +'<div class="urow-edit" id="uedit-'+u.id+'">'
        +'<div class="edit-grid"><div class="edit-field"><label>Full name</label><input id="eu-name-'+u.id+'" value="'+u.name+'"/></div><div class="edit-field"><label>Job title</label><input id="eu-title-'+u.id+'" value="'+(u.title||'')+'"/></div></div>'
        +'<div class="edit-grid"><div class="edit-field"><label>Email</label><input id="eu-email-'+u.id+'" value="'+(u.email||'')+'"/></div><div class="edit-field"><label>Avatar color</label><select id="eu-av-'+u.id+'"><option value="g"'+(u.avatar==='g'?' selected':'')+'>Green</option><option value="b"'+(u.avatar==='b'?' selected':'')+'>Blue</option><option value="am"'+(u.avatar==='am'?' selected':'')+'>Amber</option><option value="gr"'+(u.avatar==='gr'?' selected':'')+'>Gray</option><option value="tl"'+(u.avatar==='tl'?' selected':'')+'>Teal</option><option value="pk"'+(u.avatar==='pk'?' selected':'')+'>Pink</option><option value="pu"'+(u.avatar==='pu'?' selected':'')+'>Purple</option><option value="yw"'+(u.avatar==='yw'?' selected':'')+'>Yellow</option></select></div></div>'
        +'<div class="edit-grid"><div class="edit-field"><label>Permission level</label><select id="eu-perm-'+u.id+'"><option value="admin"'+(u.permission==='admin'?' selected':'')+'>Admin</option><option value="supervisor"'+(u.permission==='supervisor'?' selected':'')+'>Supervisor</option><option value="instructor"'+(u.permission==='instructor'?' selected':'')+'>Instructor</option><option value="user"'+(u.permission==='user'?' selected':'')+'>User</option></select></div>'
        +'<div class="edit-field"><label>Supervisor</label><select id="eu-sup-'+u.id+'"><option value="">No supervisor</option>'+supEditOpts+'</select></div></div>'
        +'<div class="edit-actions"><button class="discard-btn" onclick="toggleUserEdit(\''+u.id+'\')">Cancel</button><button class="save-btn" onclick="saveUserEdit(\''+u.id+'\')">Save changes</button></div>'
      +'</div></div>';
  }).join('');

  return '<div class="form-section">'
    +'<div class="admin-note">Admin access only. All changes are audit-logged.</div>'
    +'<div class="form-card"><div class="form-title">Add new user</div>'
    +'<div class="form-grid"><input id="nu-name" placeholder="Full name *"/><input id="nu-title" placeholder="Job title"/></div>'
    +'<div class="form-grid"><input id="nu-email" placeholder="Email (@nls.solutions)"/><select id="nu-perm"><option value="user">User</option><option value="supervisor">Supervisor</option><option value="instructor">Instructor</option><option value="admin">Admin</option></select></div>'
    +'<div class="form-grid"><select id="nu-sup"><option value="">No supervisor</option>'+allSupOpts+'</select>'
    +'<select id="nu-av"><option value="g">Avatar: Green</option><option value="b">Blue</option><option value="am">Amber</option><option value="gr">Gray</option><option value="tl">Teal</option><option value="pk">Pink</option><option value="pu">Purple</option><option value="yw">Yellow</option></select></div>'
    +'<div id="user-err" class="error-msg">Please enter a name.</div>'
    +'<div class="form-actions"><button class="btn-add" onclick="addUser()">Add user</button></div></div>'
    +'<div class="section-label">All users &amp; permissions</div>'
    +'<div class="table-panel">'+rows+'</div></div>';
}

function toggleUserEdit(uid){const el=document.getElementById('uedit-'+uid);if(el)el.classList.toggle('open');}
async function saveUserEdit(uid){
  const u=allUsers.find(x=>x.id===uid);if(!u)return;
  const name=document.getElementById('eu-name-'+uid).value.trim();if(!name)return;
  const oldName=u.name; const oldPerm=u.permission;
  const updates={name,title:document.getElementById('eu-title-'+uid).value.trim()||u.title,email:document.getElementById('eu-email-'+uid).value.trim(),avatar:document.getElementById('eu-av-'+uid).value,permission:document.getElementById('eu-perm-'+uid).value,sup_id:document.getElementById('eu-sup-'+uid).value||null};
  await sb.from('users').update(updates).eq('id',uid);
  const changes=[];
  if(oldName!==name)changes.push('renamed to '+name);
  if(oldPerm!==updates.permission)changes.push('permission: '+pLabel(oldPerm)+' → '+pLabel(updates.permission));
  await addAudit('assign',oldName+(changes.length?' ('+changes.join(', ')+')':'')+': profile updated');
  if(uid===cu.id){cu={...cu,...updates};document.getElementById('top-av').textContent=initials(cu.name);document.getElementById('top-av').className='u-av '+avc(cu.avatar);document.getElementById('top-name').textContent=cu.name;document.getElementById('top-role').textContent=cu.title+' · '+pLabel(cu.permission);}
  await loadAllData(); renderTabContent();
}
async function deleteUser(uid,name){
  await sb.from('users').delete().eq('id',uid);
  await addAudit('assign',name+' removed from system');
  await loadAllData(); renderTabContent();
}
async function addUser(){
  const name=document.getElementById('nu-name').value.trim();const err=document.getElementById('user-err');
  if(!name){err.style.display='block';return;}err.style.display='none';
  const perm=document.getElementById('nu-perm').value;
  const newUser={name,title:document.getElementById('nu-title').value.trim()||'Employee',email:document.getElementById('nu-email').value.trim()||null,permission:perm,sup_id:document.getElementById('nu-sup').value||null,avatar:document.getElementById('nu-av').value};
  await sb.from('users').insert(newUser);
  await addAudit('assign',name+' added with '+pLabel(perm)+' access');
  await loadAllData(); renderTabContent();
}

// ── AUDIT ────────────────────────────────────────────────────────────────────
function buildAuditFull(){return'<div style="padding:1rem 0"><div class="table-panel">'+(allAudit.length?'<div class="alog" style="max-height:600px">'+auditRows(allAudit.length)+'</div>':'<div class="empty-state" style="padding:24px"><div class="es-icon">📋</div><div class="es-title">No audit entries yet</div><div class="es-sub">Actions appear here as you use the tracker</div></div>')+'</div></div>';}
function auditRows(max){return allAudit.slice(0,max).map(a=>{const dc=a.action_type==='done'?'adc':a.action_type==='waived'?'adw':a.action_type==='assign'?'ada':a.action_type==='cert'?'adup':'adl';return'<div class="arow"><div class="adot '+dc+'"></div><div class="at">'+a.description+'<br><span class="aat">'+a.actor_name+'</span></div><div class="atime">'+fmtTime(a.created_at)+'</div></div>';}).join('');}

// ── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents(){
  document.querySelectorAll('.erow[data-empid]').forEach(el=>{
    el.addEventListener('click',function(){
      selEmpId=el.getAttribute('data-empid');
      const dp=document.getElementById('detail-panel');
      if(dp){dp.innerHTML=buildDetail();bindEvents();}
      document.querySelectorAll('.erow').forEach(r=>r.classList.remove('sel'));
      el.classList.add('sel');
    });
  });
  document.querySelectorAll('[data-viewmod]').forEach(function(btn){
    btn.addEventListener('click',function(ev){
      ev.stopPropagation();
      var mid=btn.getAttribute('data-viewmod');
      selModId=selModId===mid?null:mid;
      renderTabContent();
    });
  });
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',async function(ev){
      ev.stopPropagation();
      const action=el.getAttribute('data-action');
      const recid=el.getAttribute('data-recid');
      const eid=el.getAttribute('data-eid');
      const mname=el.getAttribute('data-mname')||'';
      const ename=el.getAttribute('data-ename')||'';

      if(action==='done'||action==='inst-done'){
        await sb.from('training_records').update({status:'done',completed_at:new Date().toISOString()}).eq('id',recid);
        await addAudit('done',ename+' completed '+mname);
        await loadAllData();
        if(action==='inst-done')renderTabContent();
        else{const dp=document.getElementById('detail-panel');if(dp){dp.innerHTML=buildDetail();bindEvents();}}
      }
      else if(action==='waive'){
        await sb.from('training_records').update({status:'waived',completed_at:new Date().toISOString()}).eq('id',recid);
        await addAudit('waived',mname+' waived for '+ename);
        await loadAllData();
        const dp=document.getElementById('detail-panel');if(dp){dp.innerHTML=buildDetail();bindEvents();}
      }
      else if(action==='assign'){
        const sel=document.getElementById('modselect');if(!sel||!sel.value)return;
        const mod=allMods.find(x=>x.id===sel.value);
        await sb.from('training_records').insert({user_id:eid,module_id:sel.value,status:'pend',assigned_by:cu.id});
        await addAudit('assign',(mod?mod.name:sel.value)+' assigned to '+ename);
        await loadAllData();
        const dp=document.getElementById('detail-panel');if(dp){dp.innerHTML=buildDetail();bindEvents();}
      }
      else if(action==='submit-cert'){
        await sb.from('training_records').update({status:'cert-submitted'}).eq('id',recid);
        await addAudit('cert',cu.name+' submitted certificate for '+mname);
        await loadAllData(); renderTabContent();
      }
      else if(action==='confirm-cert'){
        await sb.from('training_records').update({status:'done',completed_at:new Date().toISOString()}).eq('id',recid);
        await addAudit('done',mname+' confirmed complete for '+ename+' (certificate verified)');
        await loadAllData();
        const dp=document.getElementById('detail-panel');if(dp){dp.innerHTML=buildDetail();bindEvents();}
        renderTabs();
      }
    });
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
// Listen for auth changes - this fires when magic link is clicked
sb.auth.onAuthStateChange(async (event, session) => {
  if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
    if (!cu) {
      cuSession = session;
      await bootApp(session.user.email);
    }
  }
  if (event === 'SIGNED_OUT') {
    cu = null;
  }
});

(async()=>{
  // Check existing session on page load
  const {data:{session}} = await sb.auth.getSession();
  if(session){ cuSession=session; await bootApp(session.user.email); }
})();
</script>
